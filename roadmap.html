<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dialogue Graph System — Roadmap | Beka Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* ─── BekaForge brand tokens ─────────────────────── */
      --bf-forge:      #E8541A;
      --bf-forge-light:#FF7A40;
      --bf-forge-dark: #BF3D10;
      --bf-obsidian:   #0E1117;
      --bf-steel:      #1C2333;
      --bf-steel-mid:  #252E42;
      --bf-slate:      #8892A4;
      --bf-ash:        #F0F2F5;
      /* ─── Roadmap semantic aliases ───────────────────── */
      --bg:var(--bf-obsidian); --surface:var(--bf-steel); --surface2:var(--bf-steel-mid); --surface3:#2a3450;
      --border:var(--bf-steel-mid); --border2:#2e3d5c;
      --text:var(--bf-ash); --text2:var(--bf-slate); --text3:#5a6580;
      --accent:var(--bf-forge); --accent-dim:rgba(232,84,26,0.10); --accent-glow:rgba(232,84,26,0.22);
      --green:#22c55e; --green-dim:rgba(34,197,94,0.10);
      --blue:#60a5fa; --blue-dim:rgba(96,165,250,0.10);
      --yellow:#fbbf24; --yellow-dim:rgba(251,191,36,0.10);
      --red:#f87171; --red-dim:rgba(248,113,113,0.10);
      --gray:#6b7280; --gray-dim:rgba(107,114,128,0.10);
      --purple:#c084fc; --purple-dim:rgba(192,132,252,0.10);
      --r:8px; --r-sm:5px;
    }
    html { font-size:14px; scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; line-height:1.55; min-height:100vh; }
    h1,h2,h3,h4,.ver-title,.hd-title { font-family:'Space Grotesk',system-ui,sans-serif; }
    code,pre { font-family:'JetBrains Mono',monospace; }
    ::-webkit-scrollbar{width:5px;height:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    a{color:var(--accent);text-decoration:none}
    /* ─── Topbar ─────────────────────────────────────────────── */
    .rm-topbar{
      position:sticky;top:0;z-index:50;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      background:rgba(14,17,23,0.92);
      border-bottom:1px solid var(--bf-steel-mid);
    }
    .rm-topbar-inner{
      max-width:1380px;margin:0 auto;padding:0 1.4rem;height:58px;
      display:flex;align-items:center;gap:0.75rem;
    }
    .rm-brand{display:flex;align-items:center;gap:0;text-decoration:none;flex-shrink:0}
    .rm-brand-text{display:flex;flex-direction:column;gap:1px;line-height:1}
    .rm-brand-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-0.02em;}
    .rm-beka{color:var(--bf-ash)} .rm-forge{color:var(--bf-forge)}
    .rm-brand-text small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:10px;letter-spacing:0.14em;color:var(--bf-slate);text-transform:uppercase;margin-top:3px;}
    .rm-spacer{flex:1}
    .rm-back-btn{
      font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
      color:var(--bf-slate);text-decoration:none;
      padding:0.42rem 0.75rem;
      border:1px solid var(--bf-steel-mid);border-radius:6px;
      white-space:nowrap;transition:color 180ms ease,border-color 180ms ease;
    }
    .rm-back-btn:hover{color:var(--bf-ash);border-color:var(--bf-slate)}
    /* ─── Page hero ──────────────────────────────────────────── */
    .rm-hero{
      padding:36px 0 24px;
      border-bottom:1px solid var(--border);
      margin-bottom:24px;
      display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;
    }
    .rm-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
    .rm-page-title{font-size:26px;font-weight:700;letter-spacing:-0.025em;color:var(--text);margin-bottom:4px;}
    .rm-page-sub{font-size:13px;color:var(--text3);}
    .wrap{max-width:1300px;margin:0 auto;padding:0 20px 64px}
    .header{padding:30px 0 22px;border-bottom:1px solid var(--border);margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
    .hd-brand{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
    .hd-title{font-size:24px;font-weight:800;letter-spacing:-0.025em;color:var(--text);margin-bottom:4px}
    .hd-sub{font-size:12px;color:var(--text3)}
    .hd-right{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
    .stats{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2px}
    .stat{padding:8px 14px;text-align:center;border-radius:6px;min-width:66px}
    .stat-val{font-size:20px;font-weight:800;line-height:1;letter-spacing:-0.02em}
    .stat-lbl{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-top:3px}
    .stat-active{background:var(--surface3)}
    .s-total .stat-val{color:var(--text)} .s-done .stat-val{color:var(--green)} .s-wip .stat-val{color:var(--blue)} .s-plan .stat-val{color:var(--yellow)} .s-pct .stat-val{color:var(--accent)}
    .mode-row{display:flex;align-items:center;gap:8px}
    .mode-lbl{font-size:11px;color:var(--text3)}
    .mode-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
    .mode-btn{padding:6px 14px;font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:background 0.13s,color 0.13s}
    .mode-btn.active{background:var(--accent);color:#fff}
    .mode-btn:hover:not(.active){background:var(--surface3);color:var(--text2)}
    .pub-banner{display:none;align-items:center;gap:10px;background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:var(--r);padding:9px 14px;font-size:12px;color:var(--accent);margin-bottom:20px}
    body.pub-mode .pub-banner{display:flex}
    .pub-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .ctrl-search{position:relative;flex:1;min-width:180px}
    .ctrl-search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
    .ctrl-input{width:100%;padding:7px 10px 7px 30px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:12px;outline:none;transition:border-color 0.13s}
    .ctrl-input:focus{border-color:var(--accent)} .ctrl-input::placeholder{color:var(--text3)}
    .ctrl-select{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:12px;outline:none;cursor:pointer}
    .ctrl-select:focus{border-color:var(--accent)}
    .ctrl-actions{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
    .btn{padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:0.03em;border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--border);transition:all 0.12s}
    .btn-ghost{background:var(--surface2);color:var(--text2)} .btn-ghost:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
    .btn-danger{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,0.2)} .btn-danger:hover{background:rgba(248,113,113,0.18)}
    .vgroup{margin-bottom:28px}
    .vgroup-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;user-select:none;padding:6px 0}
    .vg-arrow{color:var(--text3);font-size:11px;transition:transform 0.15s;width:14px;text-align:center;flex-shrink:0}
    .vgroup.collapsed .vg-arrow{transform:rotate(-90deg)}
    .vg-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.015em}
    .vg-sub{font-size:11px;color:var(--text3);font-style:italic}
    .vtag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0}
    .vtag-released{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
    .vtag-planned{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(251,191,36,0.2)}
    .vtag-addon{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(192,132,252,0.2)}
    .vg-prog{display:flex;align-items:center;gap:7px;margin-left:auto;flex-shrink:0}
    .vg-prog-bar{width:120px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    .vg-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s}
    .vg-prog-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
    .vgroup-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:10px}
    .vgroup.collapsed .vgroup-body{display:none}
    .tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px 10px;display:flex;flex-direction:column;transition:border-color 0.13s;border-left-width:3px}
    .tcard:hover{border-color:var(--border2)}
    .tcard.st-done{border-left-color:var(--green)} .tcard.st-inprog{border-left-color:var(--blue)}
    .tcard.st-planned{border-left-color:var(--border2)} .tcard.st-onhold{border-left-color:var(--gray)} .tcard.st-maybe{border-left-color:var(--purple)}
    .tc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
    .tc-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;flex:1}
    .tc-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
    .badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border:none;transition:opacity 0.12s,transform 0.08s;white-space:nowrap}
    body.pub-mode .badge{cursor:default}
    .badge:hover{opacity:0.75} .badge:active{transform:scale(0.95)}
    .bd-done{background:var(--green-dim);color:var(--green)} .bd-inprog{background:var(--blue-dim);color:var(--blue)}
    .bd-planned{background:var(--yellow-dim);color:var(--yellow)} .bd-onhold{background:var(--gray-dim);color:var(--gray)} .bd-maybe{background:var(--purple-dim);color:var(--purple)}
    .bd-critical{background:var(--red-dim);color:var(--red)} .bd-high{background:var(--accent-dim);color:var(--accent)} .bd-medium{background:var(--yellow-dim);color:var(--yellow)} .bd-low{background:var(--gray-dim);color:var(--gray)}
    .tc-desc{font-size:11.5px;color:var(--text2);line-height:1.55;margin-bottom:9px}
    .tc-cats{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
    .cat-pill{font-size:10px;padding:2px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text3)}
    .tc-pub-note{margin-bottom:8px;padding:7px 10px;background:var(--accent-dim);border-left:2px solid rgba(249,115,22,0.35);border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:11px;color:var(--text2);line-height:1.5}
    .tc-note-lbl{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px}
    .tc-pub-note .tc-note-lbl{color:var(--accent)}
    .tc-int-note{margin-bottom:8px;padding:7px 10px;background:var(--surface2);border-left:2px solid var(--border2);border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:11px;color:var(--text2);line-height:1.5}
    .tc-int-note .tc-note-lbl{color:var(--text3)}
    body.pub-mode .int-only{display:none!important}
    .tc-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:10.5px;color:var(--text3);padding-top:7px;border-top:1px solid var(--border);margin-top:auto}
    .tc-meta-item{display:flex;align-items:center;gap:3px} .tc-meta-val{color:var(--text2)}
    .tc-actions{display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:7px;border-top:1px solid var(--border)}
    .btn-sm{padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:0.03em;border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all 0.11s}
    .btn-sm:hover{background:var(--surface3);color:var(--text)}
    .btn-sm-done{background:var(--green-dim);color:var(--green);border-color:rgba(34,197,94,0.2)} .btn-sm-done:hover{background:rgba(34,197,94,0.18)}
    .btn-sm-edit{margin-left:auto}
    .tc-edit{display:none;flex-direction:column;gap:8px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--border2)}
    .tc-edit.open{display:flex}
    .edit-row{display:flex;gap:8px;flex-wrap:wrap}
    .edit-f{flex:1;min-width:110px}
    .edit-lbl{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
    .edit-sel,.edit-ta{width:100%;padding:6px 8px;background:var(--surface3);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:11px;outline:none;font-family:inherit;transition:border-color 0.13s}
    .edit-sel:focus,.edit-ta:focus{border-color:var(--accent)}
    .edit-ta{resize:vertical;min-height:52px;line-height:1.5}
    .empty-msg{text-align:center;padding:36px 20px;color:var(--text3);font-size:12px;grid-column:1/-1}
    .toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 14px;font-size:12px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.5);transform:translateY(16px);opacity:0;transition:all 0.18s;z-index:9999;pointer-events:none;max-width:280px}
    .toast.show{transform:translateY(0);opacity:1} .toast.t-ok{border-left:3px solid var(--green)} .toast.t-err{border-left:3px solid var(--red)}
    .footer{margin-top:48px;padding-top:18px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--text3)}
    @media(max-width:800px){.header{flex-direction:column}.hd-right{align-items:flex-start}.vgroup-body{grid-template-columns:1fr}.controls{flex-direction:column}.ctrl-actions{margin-left:0;width:100%;justify-content:flex-start}.vg-prog{display:none}}
    @media(max-width:480px){.wrap{padding:0 12px 48px}.stats{flex-wrap:wrap}.stat{min-width:54px}}

    /* ── PUBLIC MODE: clean minimal cards ── */
    body.pub-mode .tc-desc{display:none}
    body.pub-mode .tc-cats{display:none}
    body.pub-mode .tc-meta{display:none}
    body.pub-mode .bd-critical,body.pub-mode .bd-high,body.pub-mode .bd-medium,body.pub-mode .bd-low{display:none}
    body.pub-mode .tc-pub-note .tc-note-lbl{display:none}
    body.pub-mode .tc-pub-note{margin-bottom:0;border-left:none;background:transparent;padding:4px 0 0;font-size:12px;color:var(--text3)}
    body.pub-mode .tcard{padding:12px 14px 12px;gap:0}
    body.pub-mode .tc-top{margin-bottom:4px}
    body.pub-mode .vgroup-body{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
    body.pub-mode .controls .ctrl-actions .btn-danger{display:none}
    body.pub-mode .hd-sub::after{content:" — public view"}
    /* ── PROMPT MODAL ── */
    .pm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
    .pm-overlay.open{display:flex}
    .pm-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);max-width:700px;width:100%;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
    .pm-hd{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
    .pm-hd-left{display:flex;flex-direction:column;gap:2px}
    .pm-title{font-size:12px;font-weight:700;color:var(--text)}
    .pm-sub{font-size:10px;color:var(--text3)}
    .pm-body{padding:14px 16px;overflow-y:auto;flex:1}
    .pm-pre{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:11px;color:var(--text2);white-space:pre-wrap;word-break:break-word;line-height:1.65;background:var(--surface3);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px}
    .pm-ft{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
    .btn-sm-prompt{background:var(--accent-dim);color:var(--accent);border-color:rgba(249,115,22,0.2)}
    .btn-sm-prompt:hover{background:var(--accent-glow)}
    
    /* ── DRAG & DROP ── */
    body:not(.pub-mode) .tcard{cursor:grab}
    body:not(.pub-mode) .tcard:active{cursor:grabbing}
    .tcard.dragging{opacity:0.35;transform:scale(0.98)}
    .tcard.drag-over{border-color:var(--accent)!important;box-shadow:0 0 0 1px var(--accent),0 4px 16px rgba(249,115,22,0.15);transform:translateY(-2px)}
    .drag-handle{position:absolute;top:50%;right:-18px;transform:translateY(-50%);color:var(--text3);font-size:11px;letter-spacing:2px;opacity:0;transition:opacity 0.15s;pointer-events:none;user-select:none}
    body:not(.pub-mode) .tcard:hover .drag-handle{opacity:1}
    .tcard{position:relative}
        #importFile{display:none}
  </style>
</head>
<body class="pub-mode">
<div class="toast" id="toast"></div>

<!-- Topbar -->
<header class="rm-topbar">
  <div class="rm-topbar-inner">
    <a class="rm-brand" href="dgs-docs/index.html">
      <img src="dgs-docs/brand/logo-primary-transparent-dark@1x.png" alt="BekaForge — Dialogue Graph System" height="36" style="display:block;">
    </a>
    <div class="rm-spacer"></div>
    <a class="rm-back-btn" href="dgs-docs/index.html">&#8592; Documentation</a>
  </div>
</header>

<div class="wrap">
  <div class="rm-hero">
    <div>
      <div class="rm-eyebrow">Product Roadmap</div>
      <h1 class="rm-page-title">Dialogue Graph System</h1>
      <p class="rm-page-sub">What&rsquo;s built, what&rsquo;s coming next.</p>
    </div>
    <div class="hd-right">
      <div class="stats" id="stats"></div>
      <div class="mode-row" style="display:none">
        <span class="mode-lbl">View:</span>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="internal" onclick="setMode('internal')">Internal</button>
          <button class="mode-btn" data-mode="public" onclick="setMode('public')">Public</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-search">
      <span class="ctrl-search-ico">&#8981;</span>
      <input class="ctrl-input" type="text" id="searchInput" placeholder="Search tasks&hellip;" oninput="applyFilters()">
    </div>
    <select class="ctrl-select" id="fVersion" onchange="applyFilters()"><option value="">All Versions</option></select>
    <select class="ctrl-select" id="fStatus" onchange="applyFilters()">
      <option value="">All Statuses</option>
      <option>Done</option><option>In Progress</option><option>Planned</option><option>On Hold</option><option>Maybe Later</option>
    </select>
    <select class="ctrl-select" id="fPriority" style="display:none" onchange="applyFilters()">
      <option value="">All Priorities</option>
      <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
    </select>
    <select class="ctrl-select" id="fCategory" style="display:none" onchange="applyFilters()"><option value="">All Categories</option></select>
    <div class="ctrl-actions">




    </div>
  </div>


  <main id="main"></main>
  <footer class="footer">
    <p>Dialogue Graph System &nbsp;&middot;&nbsp; <a href="https://bekaforge.com" target="_blank">Beka Forge</a></p>
  </footer>
</div>
<script>
const VERSIONS=[
  {id:'v2.0',name:'DGS v2.0',sub:'Current Public Release',tag:'released',order:0},
  {id:'v2.1',name:'DGS v2.1',sub:'Logic & Runtime Foundation',tag:'planned',order:1},
  {id:'v2.2',name:'DGS v2.2',sub:'Localization & CSV Workflow',tag:'planned',order:2},

let tasks=[],openEdits=new Set(),collapsedVers=new Set(),isPublicMode=false;
let filters={search:'',version:'',status:'',priority:'',category:''};
function loadState(){try{const r=localStorage.getItem('dgs-roadmap-v2');if(r){const d=JSON.parse(r);tasks=d.tasks||JSON.parse(JSON.stringify(DEFAULT_TASKS));collapsedVers=new Set(d.collapsed||[]);}else tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));}catch(e){tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));}}
function save(){try{localStorage.setItem('dgs-roadmap-v2',JSON.stringify({tasks,collapsed:Array.from(collapsedVers)}));}catch(e){}}
function applyFilters(){filters.search=document.getElementById('searchInput').value.toLowerCase();filters.version=document.getElementById('fVersion').value;filters.status=document.getElementById('fStatus').value;filters.priority=document.getElementById('fPriority').value;filters.category=document.getElementById('fCategory').value;render();}
function matchTask(t){if(filters.search&&!t.title.toLowerCase().includes(filters.search)&&!t.description.toLowerCase().includes(filters.search))return false;if(filters.version&&t.version!==filters.version)return false;if(filters.status&&t.status!==filters.status)return false;if(filters.priority&&t.priority!==filters.priority)return false;if(filters.category&&!t.category.includes(filters.category))return false;return true;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function statusClass(s){return{'Done':'done','In Progress':'inprog','Planned':'planned','On Hold':'onhold','Maybe Later':'maybe'}[s]||'planned';}
function priorityClass(p){return{'Critical':'critical','High':'high','Medium':'medium','Low':'low'}[p]||'low';}
function renderStats(){const total=tasks.length,done=tasks.filter(t=>t.status==='Done').length,wip=tasks.filter(t=>t.status==='In Progress').length,plan=tasks.filter(t=>t.status==='Planned').length,pct=total>0?Math.round(done/total*100):0;document.getElementById('stats').innerHTML=`<div class="stat s-total"><div class="stat-val">${total}</div><div class="stat-lbl">Total</div></div><div class="stat s-done stat-active"><div class="stat-val">${done}</div><div class="stat-lbl">Done</div></div><div class="stat s-wip"><div class="stat-val">${wip}</div><div class="stat-lbl">In Progress</div></div><div class="stat s-plan"><div class="stat-val">${plan}</div><div class="stat-lbl">Planned</div></div><div class="stat s-pct"><div class="stat-val">${pct}%</div><div class="stat-lbl">Complete</div></div>`;}
function renderCard(t){const sc=statusClass(t.status),pc=priorityClass(t.priority),cats=t.category.map(c=>`<span class="cat-pill">${esc(c)}</span>`).join(''),hasPub=t.publicNote&&t.publicNote.trim(),hasInt=t.internalNote&&t.internalNote.trim(),hasVal=t.valueReason&&t.valueReason.trim(),editOpen=openEdits.has(t.id);return`<div class="tcard st-${sc}" data-id="${esc(t.id)}" draggable="true"><div class="tc-top"><div class="tc-title">${esc(t.title)}</div><div class="tc-badges"><span class="badge bd-${sc}" title="Click to cycle status" onclick="cycleStatus('${esc(t.id)}')">${esc(t.status)}</span><span class="badge bd-${pc}" title="Click to cycle priority" onclick="cyclePriority('${esc(t.id)}')">${esc(t.priority)}</span></div></div><div class="tc-desc">${esc(t.description)}</div><div class="tc-cats">${cats}</div>${hasPub?`<div class="tc-pub-note"><div class="tc-note-lbl">Public Note</div>${esc(t.publicNote)}</div>`:''} ${hasInt?`<div class="tc-int-note int-only"><div class="tc-note-lbl">Internal Note</div>${esc(t.internalNote)}</div>`:''}<div class="tc-meta">${t.complexity?`<span class="tc-meta-item"><span>Complexity:</span><span class="tc-meta-val">${esc(t.complexity)}</span></span>`:''} ${hasVal?`<span class="tc-meta-item int-only" title="${esc(t.valueReason)}"><span>Value:</span><span class="tc-meta-val" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.valueReason.slice(0,55))}${t.valueReason.length>55?'…':''}</span></span>`:''}</div><div class="tc-actions int-only"><button class="btn-sm btn-sm-done" onclick="markDone('${esc(t.id)}')">&#10003; Done</button><button class="btn-sm btn-sm-prompt" onclick="pmOpen('${esc(t.id)}')" title="Generate LLM prompt for this feature">&#9881; Prompt</button><button class="btn-sm btn-sm-edit" onclick="toggleEdit('${esc(t.id)}')">&#9998; Edit</button></div><div class="tc-edit ${editOpen?'open':''}" id="edit-${esc(t.id)}"><div class="edit-row"><div class="edit-f"><div class="edit-lbl">Status</div><select class="edit-sel" onchange="updateField('${esc(t.id)}','status',this.value)">${['Done','In Progress','Planned','On Hold','Maybe Later'].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="edit-f"><div class="edit-lbl">Priority</div><select class="edit-sel" onchange="updateField('${esc(t.id)}','priority',this.value)">${['Critical','High','Medium','Low'].map(p=>`<option ${t.priority===p?'selected':''}>${p}</option>`).join('')}</select></div></div><div class="edit-f"><div class="edit-lbl">Public Note</div><textarea class="edit-ta" onblur="saveField('${esc(t.id)}','publicNote',this.value)" placeholder="Visible to users…">${esc(t.publicNote)}</textarea></div><div class="edit-f"><div class="edit-lbl">Internal Note</div><textarea class="edit-ta" onblur="saveField('${esc(t.id)}','internalNote',this.value)" placeholder="Private planning notes…">${esc(t.internalNote)}</textarea></div></div></div>`;}
function renderVersionGroup(ver){const vTasks=tasks.filter(t=>t.version===ver.id),filtered=vTasks.filter(matchTask),hasFilters=filters.search||filters.status||filters.priority||filters.category;if(filters.version&&filters.version!==ver.id)return'';if(hasFilters&&filtered.length===0)return'';const show=hasFilters?filtered:vTasks,done=vTasks.filter(t=>t.status==='Done').length,total=vTasks.length,pct=total>0?Math.round(done/total*100):0,collapsed=collapsedVers.has(ver.id),tagClass={'released':'vtag-released','planned':'vtag-planned','addon':'vtag-addon'}[ver.tag]||'vtag-planned',tagLabel={'released':'Released','planned':'Planned','addon':'Add-on'}[ver.tag]||'Planned';return`<div class="vgroup ${collapsed?'collapsed':''}" id="vg-${ver.id}"><div class="vgroup-hd" onclick="toggleVer('${ver.id}')"><span class="vg-arrow">&#9660;</span><span class="vg-name">${esc(ver.name)}</span><span class="vtag ${tagClass}">${tagLabel}</span><span class="vg-sub">${esc(ver.sub)}</span><div class="vg-prog"><div class="vg-prog-bar"><div class="vg-prog-fill" style="width:${pct}%"></div></div><span class="vg-prog-lbl">${done}/${total}</span></div></div><div class="vgroup-body">${show.length?show.map(renderCard).join(''):'<div class="empty-msg">No tasks match the current filters.</div>'}</div></div>`;}
function render(){renderStats();document.getElementById('main').innerHTML=VERSIONS.map(renderVersionGroup).join('');initDrag();}
function toggleVer(id){collapsedVers.has(id)?collapsedVers.delete(id):collapsedVers.add(id);save();render();}
function findTask(id){return tasks.find(t=>t.id===id);}
function markDone(id){const t=findTask(id);if(t&&t.status!=='Done'){t.status='Done';save();render();toast('Marked as done ✓','ok');}}
function cycleStatus(id){if(isPublicMode)return;const order=['Planned','In Progress','Done','On Hold','Maybe Later'],t=findTask(id);if(t){const i=order.indexOf(t.status);t.status=order[(i+1)%order.length];save();render();}}
function cyclePriority(id){if(isPublicMode)return;const order=['Critical','High','Medium','Low'],t=findTask(id);if(t){const i=order.indexOf(t.priority);t.priority=order[(i+1)%order.length];save();render();}}
function toggleEdit(id){openEdits.has(id)?openEdits.delete(id):openEdits.add(id);const el=document.getElementById('edit-'+id);if(el)el.classList.toggle('open',openEdits.has(id));}
function updateField(id,field,value){const t=findTask(id);if(t){t[field]=value;save();openEdits.add(id);render();}}
function saveField(id,field,value){const t=findTask(id);if(t){t[field]=value;save();}}
function setMode(mode){isPublicMode=mode==='public';document.body.classList.toggle('pub-mode',isPublicMode);document.querySelectorAll('.mode-btn').forEach(b=>{b.classList.toggle('active',b.dataset.mode===mode);});}
function exportJSON(){const data={_info:'Dialogue Graph System Roadmap — Beka Forge',exportedAt:new Date().toISOString(),tasks};dl(JSON.stringify(data,null,2),`dgs-roadmap-${today()}.json`,'application/json');toast('Exported as JSON','ok');}
function importJSON(){const f=document.getElementById('importFile');if(!f.files.length)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(Array.isArray(d.tasks)){tasks=d.tasks;save();render();toast('Import successful','ok');}else throw new Error();}catch(e){toast('Invalid file format','err');}f.value='';};r.readAsText(f.files[0]);}
function exportMD(){let md=`# Dialogue Graph System — Public Roadmap\n\n*Generated ${new Date().toLocaleDateString()}*\n\n`;VERSIONS.forEach(ver=>{const vt=tasks.filter(t=>t.version===ver.id);if(!vt.length)return;md+=`## ${ver.name} — ${ver.sub}\n\n`;vt.forEach(t=>{const ico={'Done':'✅','In Progress':'\u{1F504}','Planned':'\u{1F4CB}','On Hold':'⏸','Maybe Later':'\u{1F4AD}'}[t.status]||'\u{1F4CB}';md+=`### ${ico} ${t.title}\n\n`;if(t.publicNote)md+=`> ${t.publicNote}\n\n`;md+=`**Status:** ${t.status} &nbsp; **Priority:** ${t.priority} &nbsp; **Complexity:** ${t.complexity||'—'}\n\n---\n\n`;});});dl(md,`dgs-public-roadmap-${today()}.md`,'text/markdown');toast('Public roadmap exported as Markdown','ok');}
function resetData(){if(!confirm('Reset all roadmap data to defaults? Your edits will be lost.'))return;tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));collapsedVers=new Set();openEdits=new Set();save();render();toast('Reset to default data','ok');}
function dl(content,filename,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=filename;a.click();}
function today(){return new Date().toISOString().slice(0,10);}
let _tt;function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast t-${type} show`;clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2800);}
function populateFilters(){const vs=document.getElementById('fVersion');VERSIONS.forEach(v=>{const o=document.createElement('option');o.value=v.id;o.textContent=v.name;vs.appendChild(o);});const cats=new Set();DEFAULT_TASKS.forEach(t=>t.category.forEach(c=>cats.add(c)));const cs=document.getElementById('fCategory');Array.from(cats).sort().forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;cs.appendChild(o);});}

DGS is a visual node-based dialogue authoring tool for Unity built with Unity's GraphView API.

Core architecture:
- DialogueGraphSO          ScriptableObject storing all node + connection data
- BaseDialogueNode         Abstract base class for all node data (serializable C#)
- DialogueNode             Spoken dialogue lines (speaker, text, portrait, audio)
- ChoiceNode               Branching player choices
- DialogueGraphEditorWindow  Custom EditorWindow using GraphView
- DialogueGraphView        GraphView subclass — canvas, nodes, edges
- DialogueNodeView         Visual wrapper around node data
- DialogueRunner           MonoBehaviour — executes a DialogueGraphSO at runtime
- DialogueUI               UGUI/TextMeshPro runtime display (speaker, text, choices)
- IDialogueNode            Interface all executable runtime nodes implement
- DialogueVariableStore    Runtime key-value store for bool/int/float/string (v2.1)
- JSON import/export via JsonUtility or Newtonsoft.Json

Node execution flow:
  DialogueRunner.StartDialogue(DialogueGraphSO)
    → finds StartNode → iterates via IDialogueNode.Execute(context)
    → DialogueUI displays results → waits for player input → advances

function pmOpen(id){
  const t=findTask(id);if(!t)return;
  document.getElementById('pmTitle').textContent=t.title;
  document.getElementById('pmText').textContent=buildPrompt(id);
  document.getElementById('pmOverlay').classList.add('open');
}
function pmClose(){document.getElementById('pmOverlay').classList.remove('open');}
function pmClickOutside(e){if(e.target===document.getElementById('pmOverlay'))pmClose();}
function pmCopy(){
  const txt=document.getElementById('pmText').textContent;
  navigator.clipboard.writeText(txt).then(()=>toast('Prompt copied to clipboard','ok')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Prompt copied','ok');
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')pmClose();});

/* ── DRAG & DROP ── */
let dragSrcId=null;
function initDrag(){
  if(isPublicMode)return;
  document.querySelectorAll('.tcard').forEach(card=>{
    card.addEventListener('dragstart',function(e){
      dragSrcId=this.dataset.id;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',dragSrcId);
    });
    card.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(this.dataset.id!==dragSrcId)this.classList.add('drag-over');
    });
    card.addEventListener('dragleave',function(){
      this.classList.remove('drag-over');
    });
    card.addEventListener('drop',function(e){
      e.preventDefault();
      this.classList.remove('drag-over');
      const destId=this.dataset.id;
      if(!dragSrcId||dragSrcId===destId)return;
      const src=findTask(dragSrcId),dest=findTask(destId);
      if(!src||!dest||src.version!==dest.version)return;
      const si=tasks.indexOf(src),di=tasks.indexOf(dest);
      tasks.splice(si,1);
      tasks.splice(di,0,src);
      save();render();
    });
    card.addEventListener('dragend',function(){
      this.classList.remove('dragging');
      document.querySelectorAll('.tcard').forEach(c=>c.classList.remove('drag-over'));
      dragSrcId=null;
    });
  });
}
const _importEl=document.getElementById('importFile');if(_importEl)_importEl.addEventListener('change',importJSON);
loadState();populateFilters();isPublicMode=true;render();
